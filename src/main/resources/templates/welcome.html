<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>Welcome</title>

<meta http-equiv="refresh" content="2;url=/" />

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{

    margin:0;

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:linear-gradient(135deg,#0d6efd,#4facfe);

    color:white;

    font-family:Arial,sans-serif;

}

.box{

    text-align:center;

}

h1{

    font-size:45px;

    animation:zoom 1s ease-in-out;

}

p{

    font-size:22px;

}

.spinner{

    margin-top:20px;

}

@keyframes zoom{

0%{

transform:scale(0);

}

100%{

transform:scale(1);

}

}

</style>

</head>

<body>

<div class="box">

<h1>🎉 Welcome Admin!</h1>

<p>Loading Smart Classroom Dashboard...</p>

<div class="spinner-border text-light spinner"></div>

</div>

</body>

</html>
