<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Admin Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

body{
    background:
    linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
    url('/images/classroom.png');

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, sans-serif;
}

.login-card{
    width:420px;
    background: rgba(255,255,255,0.95);
    border-radius:20px;
    padding:35px;
    box-shadow:0 15px 40px rgba(0,0,0,0.45);
    backdrop-filter: blur(10px);
    animation: fadeIn 0.8s ease-in-out;
}

.logo{
    font-size:60px;
    color:#0d6efd;
}

.btn-login{
    border-radius:10px;
    font-weight:bold;
    transition:0.3s;
}
.btn-login:hover{
    transform:translateY(-3px);
    box-shadow: 0 8px 20px rgba(13,110,253,0.4);
}

.form-control{
    border-radius:10px;
}

.card{
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
}
@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>

</head>

<body>

<div class="card login-card">

<div class="card-body p-5">

<div class="text-center mb-4">

<div class="logo">
🎓
</div>

<h3 class="fw-bold text-primary">
Smart Classroom Timetable Scheduler
</h3>

<p class="text-muted">
Administrator Login
</p>

</div>

<div th:if="${error!=null}" class="alert alert-danger text-center">
    <i class="fa-solid fa-circle-exclamation"></i>
    <span th:text="${error}"></span>
    Invalid Username or Password!
</div>

<div th:if="${param.logout}" class="alert alert-success text-center">
    <i class="fa-solid fa-circle-check"></i>
    Logout Successful!
</div>


<form action="/login" method="post">

<div class="mb-3">

<label class="fw-bold">
<i class="fa-solid fa-user"></i>
Username
</label>

<input
type="text"
name="username"
class="form-control"
placeholder="Enter Username"
required>

</div>

<div class="mb-4">

<label class="fw-bold">
<i class="fa-solid fa-lock"></i>
Password
</label>

<div class="input-group">

    <input
        type="password"
        id="password"
        name="password"
        class="form-control"
        placeholder="Enter Password"
        required>

    <button
        type="button"
        class="btn btn-outline-secondary"
        onclick="togglePassword()">

        <i id="eyeIcon" class="fa-solid fa-eye"></i>

    </button>

</div>
</div>
<div class="form-check mb-3">
    <input class="form-check-input" type="checkbox" id="rememberMe">
    <label class="form-check-label" for="rememberMe">
        Remember Me
    </label>
</div>
<div class="text-end mb-3">
    <a href="#" class="text-decoration-none"
    onclick="alert('Please contact the administrator to reset your password.');
    return false;">
        Forgot Password?
    </a>
</div>

<div class="d-grid">

<button class="btn btn-primary btn-login">

<i class="fa-solid fa-right-to-bracket"></i>

Login

</button>

</div>

</form>

</div>

</div>
<script>

function togglePassword(){

    let password =
        document.getElementById("password");

    let eye =
        document.getElementById("eyeIcon");

    if(password.type==="password"){

        password.type="text";

        eye.classList.remove("fa-eye");
        eye.classList.add("fa-eye-slash");

    }
    else{

        password.type="password";

        eye.classList.remove("fa-eye-slash");
        eye.classList.add("fa-eye");

    }

}

</script>

</body>
</html>
